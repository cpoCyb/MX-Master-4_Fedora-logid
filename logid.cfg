devices: (
{
    name: "MX Master 4";

    dpi: 1200;

    smartshift:
    {
        on: true;
        threshold: 15;
    };

    hiresscroll:
    {
        on: true;
    };

    buttons:
    (
        // Bouton AVANT → Copier
        {
            cid: 0x56;
            action:
            {
                type: "Keypress";
                keys: ["KEY_LEFTCTRL", "KEY_C"];
            };
        },

        // Bouton ARRIÈRE → Coller
        {
            cid: 0x53;
            action:
            {
                type: "Keypress";
                keys: ["KEY_LEFTCTRL", "KEY_V"];
            };
        },

        // Bouton geste → multimédia
        {
            cid: 0xc3;
            action:
            {
                type: "Gestures";
                gestures:
                (
                    {
                        direction: "Up";
                        mode: "OnRelease";
                        action:
                        {
                            type: "Keypress";
                            keys: ["KEY_VOLUMEUP"];
                        };
                    },
                    {
                        direction: "Down";
                        mode: "OnRelease";
                        action:
                        {
                            type: "Keypress";
                            keys: ["KEY_VOLUMEDOWN"];
                        };
                    },
                    {
                        direction: "Left";
                        mode: "OnRelease";
                        action:
                        {
                            type: "Keypress";
                            keys: ["KEY_PREVIOUSSONG"];
                        };
                    },
                    {
                        direction: "Right";
                        mode: "OnRelease";
                        action:
                        {
                            type: "Keypress";
                            keys: ["KEY_NEXTSONG"];
                        };
                    },
                    {
                        direction: "None";
                        mode: "OnRelease";
                        action:
                        {
                            type: "Keypress";
                            keys: ["KEY_PLAYPAUSE"];
                        };
                    }
                );
            };
        }
    );

    thumbwheel:
    {
        divert: true;

        on_left:
        {
            action:
            {
                type: "Keypress";
                keys: ["KEY_VOLUMEDOWN"];
            };
        };

        on_right:
        {
            action:
            {
                type: "Keypress";
                keys: ["KEY_VOLUMEUP"];
            };
        };
    };
}
);
