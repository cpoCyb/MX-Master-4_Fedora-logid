devices: (
{
    name: "MX Master 4";

    dpi: 4000;

    smartshift:
    {
        on: true;
        threshold: 15;
    };

    hiresscroll:
    {
        on: true;
    };

    buttons: (

        {
            cid: 0x53;
            action =
            {
                type: "Keypress";
                keys: ["KEY_LEFTCTRL", "KEY_C"];
            };
        },

        {
            cid: 0x56;
            action =
            {
                type: "Keypress";
                keys: ["KEY_LEFTCTRL", "KEY_V"];
            };
        },

        {
            cid: 0x5b;
            action =
            {
                type: "Keypress";
                keys: ["KEY_MUTE"];
            };
        }
    );

    thumbwheel:
    {
        divert: true;
        invert: false;

        left:
        {
            action =
            {
                type: "Keypress";
                keys: ["KEY_VOLUMEDOWN"];
            };
        };

        right:
        {
            action =
            {
                type: "Keypress";
                keys: ["KEY_VOLUMEUP"];
            };
        };
    };
}
);
