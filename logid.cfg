devices: (
{
    name: "MX Master 4";

    dpi: 1200;

    smartshift:
    {
        on: true;
        threshold: 15;
    };

    hiresscroll:
    {
        hires: true;
        invert: false;
        target: false;
    };

    thumbwheel:
    {
        divert: true;

        left:
        {
            mode: "OnInterval";
            interval: 1;
            action:
            {
                type: "Keypress";
                keys: ["KEY_VOLUMEDOWN"];
            };
        };

        right:
        {
            mode: "OnInterval";
            interval: 1;
            action:
            {
                type: "Keypress";
                keys: ["KEY_VOLUMEUP"];
            };
        };
    };

    buttons:
    (
        // Bouton AVANT → Copier
        {
            cid: 0x56;
            action:
            {
                type: "Keypress";
                keys: ["KEY_LEFTCTRL", "KEY_C"];
            };
        },

        // Bouton ARRIÈRE → Coller
        {
            cid: 0x53;
            action:
            {
                type: "Keypress";
                keys: ["KEY_LEFTCTRL", "KEY_V"];
            };
        }
    );
}
);
